<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#1E1E1E" />
    <meta name="color-scheme" content="dark light" />
    <!-- Speed up first paint: pre-warm connections to font + backend hosts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ehtlblplrzqdjrviodzi.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ehtlblplrzqdjrviodzi.supabase.co" />
    <!-- Preload the LCP image (Hero logo) so it starts downloading
         immediately, in parallel with the JS bundle, without waiting for
         React to mount. Reduces LCP by ~150-300ms on cold loads. -->
    <link rel="preload" as="image" href="/images/bb415772-a3bf-433b-bd51-77e20e6dbf5f.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/golfield-logo.jpeg" fetchpriority="high" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>GolField</title>
    <meta name="description" content="GolField Ferramentas Premium">
    <meta name="author" content="Lovable" />
